name: CI

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
      - name: Install only dev dependencies
        run: uv sync --only-group dev
      - name: Lint
        run: uv run --no-sync ruff check .
      - name: Format
        run: uv run --no-sync ruff format --check .

  test:
    name: Test on ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux py310
            pyversion: "3.10"
          - name: Linux py311
            pyversion: "3.11"
          - name: Linux py312
            pyversion: "3.12"
          - name: Linux py313
            pyversion: "3.13"
          - name: Linux py314
            pyversion: "3.14"
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Set up Python ${{ matrix.pyversion }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.pyversion }}
      - name: Install system dependencies
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y libgles2-mesa-dev
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Test
        run: uv run pytest tests -v --cov=collagraph --cov-report=term-missing
        env:
          QT_QPA_PLATFORM: offscreen

  pyinstaller:
    name: Test PyInstaller hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync
      - name: Test PyInstaller hooks
        run: bash tests/pyinstaller/test_pyinstaller.sh

  build:
    name: Build and test wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: uv sync
      - name: Build wheel
        run: uv build
      - name: Twine check
        run: uv run twine check dist/*
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist
          name: dist

  publish:
    name: Publish to Github and Pypi
    runs-on: ubuntu-latest
    needs: [lint, test, build, pyinstaller]
    if: success() && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/collagraph
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Release to GitHub
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            dist/*.tar.gz
            dist/*.whl
          draft: true
          prerelease: false
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
